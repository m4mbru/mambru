# openspec/config.yaml
schema: spec-driven

context: |
  Project: Mambru — a versatile desktop assistant with humor/sarcasm, local file access,
    internet/web access, real-time chat and voice communication, and deep thoughts
    via LLM reasoning.
  Stack: Tauri v2 (Rust backend) + Svelte 4 + TypeScript + Vite 5 + Vitest 2
  Architecture: Tauri desktop app with IPC-based frontend/backend separation.
    Frontend: Svelte 4 with stores (conversation, settings, voice), Svelte components
    (Chat, MessageBubble, Settings, VoiceControls, ConfirmationDialog), and API layer
    (llm.ts, tools.ts, voice.ts). Backend: Rust modules for LLM providers (Ollama,
    OpenAI/Anthropic), conversation management, voice pipeline (VAD, STT, TTS), config/
    settings persistence in TOML, tool execution, command matching, security/audit.
  Testing: Vitest frontend tests (37 passing across 3 test files). Rust backend has
    15+ unit/integration tests but cannot compile yet (missing dlltool.exe in toolchain).
  Strict TDD: enabled — frontend tests are working and must pass before frontend changes.
  Conventions: Conventional commits (no AI attribution), Svelte 4 patterns, Tauri v2
    plugin APIs, Rust edition 2021 with async/await.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Define scope clearly — what is IN and OUT
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Keep requirements testable and unambiguous
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Consider desktop integration patterns (tray, notifications, hotkeys)
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns once stack is chosen
    tdd: true
    test_command: "npm test"
  verify:
    test_command: "npm test"
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: true
  runner:
    detected: true
    command: "npm test"
    framework: "vitest"
  layers:
    unit:
      available: true
      tool: "vitest + @testing-library/svelte"
    integration:
      available: true
      tool: "vitest + jsdom (frontend); Rust #[cfg(test)] (backend, blocked by compilation)"
    e2e:
      available: false
      tool: ""
  coverage:
    available: true
    command: "vitest --coverage"
  quality:
    linter:
      available: false
      command: ""
    type_checker:
      available: true
      command: "npm run check (svelte-check + TypeScript strict mode)"
    formatter:
      available: false
      command: ""
